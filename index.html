<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#144053" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Seniors Med</title>

  <!-- Explicit webfonts: Montserrat (English) + Noto Naskh Arabic (Arabic).
       Loaded asynchronously (media="print" → "all" on load) so the app paints
       immediately and never hangs on a blank screen if the font CDN is slow or
       blocked on the user's network. Clean system fallbacks apply meanwhile. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </noscript>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-title">
        <h1 data-i18n="appTitle">Seniors Med</h1>
        <p class="app-subtitle" data-i18n="appSubtitle">Geriatric clinic visit record</p>
      </div>
      <button id="langToggle" class="btn btn-lang" type="button" aria-label="Switch language">
        العربية
      </button>
    </div>
  </header>

  <main class="container">
    <!-- Visit form -->
    <section class="card" aria-labelledby="visitHeading">
      <h2 id="visitHeading" data-i18n="visitHeading">New visit</h2>

      <form id="visitForm" novalidate>
        <!-- Patient -->
        <fieldset class="form-section">
          <legend data-i18n="sectionPatient">Patient</legend>
          <div class="grid-2">
            <div class="field">
              <label for="patientName" data-i18n="patientName">Patient name</label>
              <input id="patientName" name="patientName" type="text" autocomplete="off" required />
            </div>
            <div class="field field--age">
              <label for="age" data-i18n="age">Age</label>
              <input id="age" name="age" type="number" min="0" max="130" inputmode="numeric" />
            </div>
          </div>
          <div class="field">
            <label for="visitDate" data-i18n="visitDate">Date of visit</label>
            <input id="visitDate" name="visitDate" type="date" />
          </div>
        </fieldset>

        <!-- Problem list -->
        <fieldset class="form-section">
          <legend data-i18n="sectionProblems">Problem list</legend>
          <div id="problemChips" class="chips"></div>
          <div class="chip-add">
            <input
              id="problemOther"
              type="text"
              autocomplete="off"
              data-i18n-aria="otherPlaceholder"
              aria-label="Other condition"
            />
            <button id="addProblem" class="btn btn-secondary" type="button" data-i18n="addOther">
              + Add other
            </button>
          </div>
        </fieldset>

        <!-- Current situation -->
        <fieldset class="form-section">
          <legend data-i18n="sectionCurrent">Current situation</legend>
          <div class="field">
            <textarea id="currentSituation" rows="4" aria-label="Current situation"></textarea>
          </div>
        </fieldset>

        <!-- Vital signs (built from config) -->
        <fieldset class="form-section">
          <legend data-i18n="sectionVitals">Vital signs</legend>
          <div id="vitalsGrid" class="vitals-grid"></div>
        </fieldset>

        <!-- Assessment -->
        <fieldset class="form-section">
          <legend data-i18n="sectionAssessment">Assessment</legend>
          <div class="field">
            <textarea id="assessment" rows="3" aria-label="Assessment"></textarea>
          </div>
        </fieldset>

        <!-- Action plan -->
        <fieldset class="form-section">
          <legend data-i18n="sectionActionPlan">Action plan</legend>
          <div class="field">
            <textarea id="actionPlan" rows="3" aria-label="Action plan"></textarea>
          </div>
        </fieldset>

        <!-- Medications -->
        <fieldset class="meds form-section">
          <legend data-i18n="medications">Medications</legend>
          <div id="medsList" class="meds-list"></div>
          <button id="addMed" class="btn btn-secondary" type="button" data-i18n="addMed">
            + Add medication
          </button>
        </fieldset>

        <p id="formError" class="form-error" role="alert" hidden></p>

        <div class="actions">
          <button id="generateBtn" class="btn btn-primary" type="submit" data-i18n="generate">
            Generate record
          </button>
        </div>
      </form>
    </section>

    <!-- Most recently generated record -->
    <section id="recordSection" class="card" aria-labelledby="recordHeading" hidden>
      <h2 id="recordHeading" data-i18n="recordHeading">Visit record</h2>
      <div id="recordOutput"></div>
    </section>

    <!-- Saved records (persisted in IndexedDB) -->
    <section class="card" aria-labelledby="savedHeading">
      <h2 id="savedHeading" data-i18n="savedHeading">Saved records</h2>
      <p id="noRecords" class="muted" data-i18n="noRecords">No saved records yet.</p>
      <div id="savedList" class="saved-list"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
